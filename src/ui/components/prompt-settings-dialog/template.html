<sl-dialog id="prompt-settings-dialog" label="高级 Prompt 配置" class="prompt-settings-dialog">
    <div class="prompt-settings-content">
        <div class="prompt-settings-intro">
            <sl-icon name="magic"></sl-icon>
            <span>每种术数都分为“首问分析”和“后续追问”两套模板。这里的修改会保存到本地，并立即影响后续请求。</span>
        </div>

        <div class="prompt-settings-toolbar">
            <sl-button id="reset-prompts-btn" size="small" variant="default" outline>
                <sl-icon name="arrow-counterclockwise" slot="prefix"></sl-icon>
                恢复默认模板
            </sl-button>
        </div>

        <sl-details summary="八字 Prompt" open>
            <div class="prompt-fields">
                <sl-textarea id="prompt-bazi-initial" label="八字 - 首问分析" rows="6" resize="auto"></sl-textarea>
                <sl-textarea id="prompt-bazi-followup" label="八字 - 后续追问" rows="6" resize="auto"></sl-textarea>
            </div>
        </sl-details>

        <sl-details summary="紫微斗数 Prompt">
            <div class="prompt-fields">
                <sl-textarea id="prompt-ziwei-initial" label="紫微斗数 - 首问分析" rows="6" resize="auto"></sl-textarea>
                <sl-textarea id="prompt-ziwei-followup" label="紫微斗数 - 后续追问" rows="6" resize="auto"></sl-textarea>
            </div>
        </sl-details>

        <sl-details summary="小六壬 Prompt">
            <div class="prompt-fields">
                <sl-textarea id="prompt-xiaoliuren-initial" label="小六壬 - 首问分析" rows="6" resize="auto"></sl-textarea>

        <sl-details summary="奇门遁甲 Prompt">

            <sl-icon name="check" slot="prefix"></sl-icon>
            保存 Prompt

    </div>
